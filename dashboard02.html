<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Redes Sociais — v2</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root{
    /* Paleta — preto/laranja (validada: node scripts/validate_palette.js, dark, surface #161822) */
    --bg:#0a0a0b; --bg2:#0d0d0f; --card:#151517; --card2:#1a1a1d;
    --text:#f5f5f6; --muted:#9a9aa1; --faint:#616167;
    --accent:#d95926; --accent2:#f3853f;
    --good:#0ca30c; --critical:#d03b3b; --warn:#fab219;
    --gray1:#a1a1aa; --gray2:#71717a; --gray3:#4b4b52;
    --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter','Segoe UI',Roboto,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    letter-spacing:.01em;
    display:flex; min-height:100vh;
  }
  a{color:var(--accent);text-decoration:none}

  /* ── Sidebar estática ────────────────────────── */
  .sidebar{width:242px;flex-shrink:0;background:var(--bg);
    border-right:1px solid var(--border);padding:28px 18px;display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh}
  .brand{font-size:19px;font-weight:800;letter-spacing:-.02em;line-height:1.15;padding:0 6px}
  .brand .pro{color:var(--accent)}
  .brand small{display:block;font-weight:400;font-size:11.5px;color:var(--faint);margin-top:5px;letter-spacing:.01em}
  .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:var(--faint);margin:30px 0 8px 14px}
  .nav-btn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:transparent;border:1px solid transparent;
    color:var(--muted);font-size:13.5px;font-weight:500;padding:10px 12px;border-radius:12px;cursor:pointer;transition:background .18s,border-color .18s,color .18s;font-family:inherit}
  .nav-btn:hover{background:rgba(255,255,255,.04);color:var(--text)}
  /* Sutil, no mesmo espírito do card "Sincronizado": fundo escuro + borda + gradiente laranja de leve, não um bloco sólido */
  .nav-btn.active{background:linear-gradient(135deg,rgba(217,89,38,.24),rgba(217,89,38,.05));
    border-color:rgba(217,89,38,.4);color:var(--text);font-weight:600}
  .nav-btn.active svg{stroke:var(--accent2)}
  .nav-btn svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;opacity:.9;transition:stroke .18s}
  .sidebar .foot{margin-top:auto;padding-top:20px}
  .sync-card{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);
    border-radius:12px;padding:12px 13px;cursor:pointer;transition:border-color .2s}
  .sync-card:hover{border-color:var(--faint)}
  .sync-card .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;margin-top:2px}
  .sync-card.ok .dot{background:var(--good);box-shadow:0 0 8px var(--good)}
  .sync-card.error .dot{background:var(--critical);box-shadow:0 0 8px var(--critical)}
  .sync-card.loading .dot{background:var(--warn);animation:pulse 1s infinite}
  .sync-card .txt{font-size:12px;line-height:1.5}
  .sync-card .txt b{display:block;font-size:12.5px;font-weight:600;color:var(--text)}
  .sync-card.ok .txt b{color:var(--good)}
  .sync-card.error .txt b{color:var(--critical)}
  .sync-card .txt span{color:var(--faint);font-size:11px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  /* ── Área principal ──────────────────────────── */
  .main{flex:1;min-width:0;padding:30px 34px 60px}
  .mainhead{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:24px}
  .mainhead h1{font-size:24px;font-weight:700;margin:0;letter-spacing:-.02em}
  .mainhead .sub{font-size:13px;color:var(--muted);margin-top:4px}

  /* Filtro de período (segmented) */
  .filterbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .segmented{display:inline-flex;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:3px;gap:2px;flex-wrap:wrap}
  .seg{border:0;background:transparent;color:var(--muted);font-size:12px;font-weight:500;padding:8px 13px;border-radius:8px;cursor:pointer;transition:color .15s,background .15s;white-space:nowrap;font-family:inherit}
  .seg:hover{color:var(--text)}
  .seg.active{background:var(--accent);color:#fff}
  .period-note{font-size:12px;color:var(--faint);margin-bottom:20px}
  .period-note b{color:var(--muted);font-weight:600}

  /* Período personalizado (data-a-data) */
  .custom-range{display:none;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);
    border-radius:11px;padding:6px 12px;font-size:12px;color:var(--muted)}
  .custom-range input[type=date]{background:var(--bg2);border:1px solid var(--border);color:var(--text);
    font-family:inherit;font-size:12px;border-radius:7px;padding:6px 8px;color-scheme:dark}
  .custom-range input[type=date]:focus{outline:1px solid var(--accent)}

  .section{display:none}.section.active{display:block;animation:fade .32s cubic-bezier(.16,1,.3,1)}
  @keyframes fade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  /* Painéis de gráfico/KPI também entram com o mesmo fade (troca de aba e de período) */
  .panel,.kpi{animation:fade .32s cubic-bezier(.16,1,.3,1)}

  /* ── KPIs ────────────────────────────────────── */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:16px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:17px 18px;position:relative;overflow:hidden}
  .kpi .label{font-size:11.5px;color:var(--muted);margin-bottom:10px;font-weight:500}
  .kpi .value{font-size:25px;font-weight:700;line-height:1;letter-spacing:-.01em}
  .kpi .delta{font-size:11.5px;margin-top:9px;font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .kpi .delta .prev{color:var(--faint);font-weight:400}
  .kpi .delta.up{color:var(--good)}.kpi .delta.down{color:var(--critical)}.kpi .delta.flat{color:var(--muted)}
  .kpi.skeleton .value,.kpi.skeleton .delta{background:var(--border);color:transparent;border-radius:6px;animation:shimmer 1.2s infinite}
  @keyframes shimmer{0%,100%{opacity:.45}50%{opacity:.9}}

  /* ── Gráficos (grid estilo painel) ───────────── */
  .charts{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .span2{grid-column:span 2}.span3{grid-column:1/-1}
  @media(max-width:1100px){.charts{grid-template-columns:1fr 1fr}.span2,.span3{grid-column:1/-1}}
  @media(max-width:760px){.charts{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 18px 16px;min-width:0}
  .panel h3{margin:0 0 16px;font-size:14px;color:var(--text);display:flex;justify-content:space-between;align-items:center;font-weight:600}
  .panel h3 .h3-right{display:flex;align-items:center;gap:9px}
  .panel h3 .tag{font-size:11.5px;color:var(--faint);font-weight:400}
  .panel .cwrap{position:relative;height:230px}
  .panel.tall .cwrap{height:270px}
  canvas{max-height:100%}

  /* Toggle rosca/linha (painel "Engajamento") — retângulo largo e baixo, bem à direita do título */
  .chart-toggle{display:inline-flex;margin-left:auto;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px;flex-shrink:0}
  .ctbtn{border:0;background:transparent;color:var(--faint);width:52px;height:24px;display:inline-flex;align-items:center;justify-content:center;
    border-radius:6px;cursor:pointer;padding:0;transition:background .15s,color .15s}
  .ctbtn:hover{color:var(--text);background:rgba(255,255,255,.06)}
  .ctbtn.active{background:var(--accent);color:#fff}
  .ctbtn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}

  .err-banner{background:var(--card);border:1px solid rgba(208,59,59,.4);color:#ff9d9d;border-radius:12px;padding:14px 18px;margin-bottom:20px;font-size:13px;line-height:1.6;display:none}
  .err-banner.show{display:block}
  .err-banner code{background:rgba(208,59,59,.12);padding:2px 6px;border-radius:4px;font-size:11px}
  .foot-note{margin-top:34px;color:var(--faint);font-size:11px;line-height:1.9}
  .foot-note strong{color:var(--muted)}
</style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">

<!-- ══ CONTEÚDO ══ -->
<main class="main">

<script>
/* ══════════════════════════════════════════════════════════════
   CONFIG  ▸  Planilha e abas lidas pelo dashboard.
   ══════════════════════════════════════════════════════════════ */
const SHEET_ID   = '10sQEu4w5rVB-OdE6qaFFuuyt160HeNM_k1wXcdmrZoA';

/* Abas lidas por GID (à prova de erro — ler por NOME cai na 1ª aba se o nome
   não bater exatamente). A cada novo ano, crie a aba na planilha e adicione
   aqui a linha com o gid dela (pega-se o gid na URL: .../edit#gid=NÚMERO).
   Várias abas da mesma rede são mescladas (ex.: 2026 + 2027). */
const TABS = [
  { net:'tiktok',           year:2026, gid:'618666212',  name:'Tiktok - 2026' },
  { net:'youtube',          year:2026, gid:'1306894247', name:'Youtube - Cortes - 2026' },
  { net:'youtube_seller',   year:2026, gid:'1763583022', name:'Youtube - 2026' },
  { net:'instagram',        year:2026, gid:'1888522265', name:'Instagram Bruno - 2026' },
  { net:'instagram_seller', year:2026, gid:'1349159724', name:'Instagram Seller Pro - 2026' },
];

/* Tipos de métrica:
     stock = valor acumulado (ex.: seguidores totais) → usa o último dia
     flow  = fluxo somável (ex.: views, curtidas, leads) → soma o período
     rate  = taxa/percentual (ex.: CTR) → média do período (pp na variação)
   col = índice 0-based da coluna na tabela diária da aba.               */
const METRICS = {
  tiktok: [
    { col:1,  label:'Seguidores Totais', type:'stock' },
    { col:2,  label:'Novos Seguidores',  type:'flow'  },
    { col:3,  label:'Visualizações',     type:'flow'  },
    { col:4,  label:'Curtidas',          type:'flow'  },
    { col:5,  label:'Views de Perfil',   type:'flow'  },
    { col:6,  label:'Compartilhamentos', type:'flow'  },
  ],
  youtube: [
    { col:1,  label:'Impressões',        type:'flow'  },
    { col:2,  label:'Visualizações',     type:'flow'  },
    { col:3,  label:'Tempo Exibição',    type:'flow', hours:true },
    { col:4,  label:'Inscritos Totais',  type:'stock' },
    { col:5,  label:'Inscrições Obtidas',type:'flow'  },
    { col:6,  label:'CTR',               type:'rate'  },
    { col:7,  label:'Continuaram Assis.',type:'rate'  },
    { col:8,  label:'Curtidas',          type:'flow'  },
    { col:9,  label:'Compartilhamentos', type:'flow'  },
    { col:10, label:'Views de Perfil',   type:'flow'  },
  ],
  instagram: [
    { col:1,  label:'Seguidores Totais', type:'stock' },
    { col:2,  label:'Novos Seguidores',  type:'flow'  },
    { col:3,  label:'Visualizações',     type:'flow'  },
    { col:4,  label:'Views de Perfil',   type:'flow'  },
    { col:5,  label:'Curtidas',          type:'flow'  },
    { col:6,  label:'Compartilhamentos', type:'flow'  },
    { col:7,  label:'Salvamentos',       type:'flow'  },
    { col:8,  label:'Comentários',       type:'flow'  },
  ],
};
/* Contas novas: mesma estrutura de colunas das redes originais (0–10 do
   YouTube e 0–8 do Instagram são idênticas nas abas novas). */
METRICS.youtube_seller   = METRICS.youtube;
METRICS.instagram_seller = METRICS.instagram;

/* Gráficos por rede.
   kind: 'line' | 'gradbar' (colunas com gradiente vertical) | 'doughnut'
   cls : 'span2' | 'span3' | '' (largura no grid de 3 colunas)          */
const CHARTS = {
  tiktok: [
    { title:'Visualizações',        tag:'por período', kind:'line', cls:'span2', tall:true, series:[{col:3,color:'accent'}] },
    { title:'Engajamento', kind:'doughnut', cls:'', series:[
        {col:4,label:'Curtidas',color:'accent'},{col:6,label:'Compart.',color:'gray1'},{col:5,label:'Views de Perfil',color:'gray2'}] },
    { title:'Novos Seguidores',     tag:'por período', kind:'gradbar', cls:'span2', series:[{col:2}] },
    { title:'Seguidores Totais',    tag:'evolução', kind:'line', cls:'', series:[{col:1,color:'accent'}] },
  ],
  youtube: [
    { title:'Visualizações',        tag:'por período', kind:'line', cls:'span2', tall:true, series:[{col:2,color:'accent'}] },
    { title:'Engajamento', kind:'doughnut', cls:'', series:[
        {col:8,label:'Curtidas',color:'accent'},{col:9,label:'Compart.',color:'gray1'},{col:5,label:'Inscrições',color:'gray2'}] },
    { title:'Inscrições Obtidas',   tag:'por período', kind:'gradbar', cls:'span2', series:[{col:5}] },
    { title:'Retenção média',       tag:'% por período', kind:'line', cls:'', pct:true, series:[{col:7,color:'accent'}] },
  ],
  instagram: [
    { title:'Visualizações',        tag:'por período', kind:'line', cls:'span2', tall:true, series:[{col:3,color:'accent'}] },
    { title:'Engajamento', kind:'doughnut', cls:'', series:[
        {col:5,label:'Curtidas',color:'accent'},{col:6,label:'Compart.',color:'gray1'},{col:7,label:'Salvam.',color:'gray2'},{col:8,label:'Comentários',color:'gray3'}] },
    { title:'Novos Seguidores',     tag:'por período', kind:'gradbar', cls:'span2', series:[{col:2}] },
    { title:'Views de Perfil',      tag:'por período', kind:'line', cls:'', series:[{col:4,color:'accent'}] },
  ],
};
CHARTS.youtube_seller   = CHARTS.youtube;
CHARTS.instagram_seller = CHARTS.instagram;

/* Presets de período (contam a partir de hoje; dados são semanais). */
const PERIODS = [
  { id:'d7',   label:'7 dias',   days:7  },
  { id:'d28',  label:'28 dias',  days:28 },
  { id:'d60',  label:'60 dias',  days:60 },
  { id:'d90',  label:'90 dias',  days:90 },
  { id:'y1',   label:'Último ano',days:365},
  { id:'all',  label:'Total',    days:null },
  { id:'custom', label:'Personalizado', days:null },
];
let currentPeriod = 'd90';
let customFrom=null, customTo=null;   // yyyy-mm-dd (valor cru dos <input type=date>)
const NET_TITLE = {
  tiktok:'TikTok',
  youtube:'YouTube — Cortes',
  youtube_seller:'YouTube — Seller Pro',
  instagram:'Instagram — Bruno',
  instagram_seller:'Instagram — Seller Pro',
};
const NETS = Object.keys(NET_TITLE);   // redes exibidas (ordem da sidebar)

/* ══ THEME ═══════════════════════════════════════════════
   Paleta preto/laranja — validada em node scripts/validate_palette.js
   (dataviz skill): accent = categórico "orange" (dark step), gray1..3 =
   neutros p/ fatias secundárias dos doughnuts (evita par laranja↔amarelo,
   que falha o piso de daltonismo lado a lado no anel). */
const C = { accent:'#d95926', accent2:'#f3853f', good:'#0ca30c', critical:'#d03b3b', warn:'#fab219',
            gray1:'#a1a1aa', gray2:'#71717a', gray3:'#4b4b52', grid:'#232327', txt:'#9a9aa1' };
Chart.defaults.color       = C.txt;
Chart.defaults.borderColor = C.grid;
Chart.defaults.font.family = "'Inter','Segoe UI',Roboto,Arial,sans-serif";
Chart.defaults.font.size   = 11;

/* ══ HELPERS ═════════════════════════════════════════════ */
const el  = id => document.getElementById(id);
const store = {};   // dados brutos por rede: { rows:[{date, vals:[]}] }

function fmtNum(n){ return n==null?'—':Number(Math.round(n)).toLocaleString('pt-BR'); }
function fmtMoney(n){ return n==null?'—':'R$ '+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtHours(n){ return n==null?'—':Number(n).toLocaleString('pt-BR',{maximumFractionDigits:0})+'h'; }
function fmtPct(n){ return n==null?'—':(n*100).toFixed(2).replace('.',',')+'%'; }
function fmtMetric(m,v){ if(v==null)return '—'; if(m.money)return fmtMoney(v); if(m.hours)return fmtHours(v); if(m.type==='rate')return fmtPct(v); return fmtNum(v); }

// Converte "5,40%" / "33 295" / "1.234,5" (pt-BR) → número. % vira fração.
function parseVal(s){
  if(s==null) return null;
  if(typeof s==='number') return s;
  s=String(s).trim();
  if(s===''||s==='-'||s==='#DIV/0!'||s==='#N/A') return null;
  const isPct=s.endsWith('%');
  let clean=s.replace(/\s/g,'').replace('%','');
  // remove separador de milhar . quando há vírgula decimal
  if(clean.indexOf(',')>-1) clean=clean.replace(/\./g,'').replace(',','.');
  const n=parseFloat(clean);
  if(isNaN(n)) return null;
  return isPct? n/100 : n;
}

// Converte célula de data do gviz ("Date(2026,6,1)" ou ISO) → Date (00:00 local)
function parseDate(s){
  if(s==null||s==='') return null;
  if(s instanceof Date) return s;
  let m=String(s).match(/Date\((\d+),(\d+),(\d+)/);
  if(m) return new Date(+m[1], +m[2], +m[3]);
  let d=new Date(s);
  return isNaN(d)? null : d;
}

/* ══ GVIZ JSONP ══════════════════════════════════════════ */
function gvizLoad(gid, cbName){
  return new Promise((resolve,reject)=>{
    const timer=setTimeout(()=>{ delete window[cbName]; reject(new Error('Timeout — planilha inacessível?')); },15000);
    window[cbName]=(resp)=>{
      clearTimeout(timer); delete window[cbName];
      if(resp.status==='error') reject(new Error(resp.errors?.[0]?.detailed_message||resp.errors?.[0]?.message||'Erro da planilha'));
      else resolve(resp.table);
    };
    const s=document.createElement('script');
    s.onerror=()=>{ clearTimeout(timer); delete window[cbName]; reject(new Error('Falha ao carregar gid '+gid)); };
    const tqx='out:json;responseHandler:'+cbName;
    s.src=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`
        + `?tqx=${encodeURIComponent(tqx)}&gid=${encodeURIComponent(gid)}&headers=1`;
    document.head.appendChild(s);
  });
}

// gviz table → [{date:Date, vals:[num|null,...]}], ignorando linhas sem data
function tableToRows(table){
  const out=[];
  for(const row of table.rows){
    const c=row.c||[];
    const date=parseDate(c[0]?.v);
    if(!date) continue;
    const vals=c.map((cell,i)=> i===0 ? null : (cell? parseVal(cell.v!=null?cell.v:cell.f) : null));
    out.push({date, vals});
  }
  out.sort((a,b)=>a.date-b.date);
  return out;
}

/* ══ SELEÇÃO DE PERÍODO ══════════════════════════════════
   Dados são semanais (1 linha por período de ~7 dias), então fatiamos por
   CONTAGEM de períodos (7d→1, 28d→4, 60d→~9, 90d→~13, ano→52, total→tudo)
   e o comparativo é a mesma quantidade de períodos imediatamente anterior. */
function rangeOf(slice){
  if(!slice.length) return null;
  const end=new Date(slice[slice.length-1].date.getTime()); end.setDate(end.getDate()+6);
  return [slice[0].date, end];
}
// "yyyy-mm-dd" (valor de <input type=date>) → Date local à meia-noite (evita
// o shift de fuso do new Date(string) nativo, mesma lógica de parseDate acima).
function dateFromInput(v){ if(!v) return null; const p=v.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
function fmtInputDate(d){ const pad=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }

function slicePeriod(rows){
  const p=PERIODS.find(p=>p.id===currentPeriod);
  if(!rows.length) return {cur:[],prev:[]};
  if(p.id==='custom'){
    const start=dateFromInput(customFrom), end=dateFromInput(customTo);
    if(!start||!end) return { cur:[], prev:[], curRange:null, prevRange:null };
    const cur=rows.filter(r=> r.date>=start && r.date<=end);
    const n=cur.length;
    const firstIdx=rows.findIndex(r=> r.date>=start);
    const prev = n && firstIdx>0 ? rows.slice(Math.max(0,firstIdx-n), firstIdx) : [];
    return { cur, prev, curRange: cur.length?rangeOf(cur):[start,end], prevRange: prev.length?rangeOf(prev):null };
  }
  if(p.days==null) return { cur:rows, prev:[], curRange:rangeOf(rows), prevRange:null };
  const n=Math.max(1, Math.round(p.days/7));
  const cur =rows.slice(-n);
  const prev=rows.slice(-2*n, -n);
  return { cur, prev, curRange:rangeOf(cur), prevRange:rangeOf(prev) };
}

function aggregate(rows, m){
  const vals=rows.map(r=>r.vals[m.col]).filter(v=>v!=null);
  if(!vals.length) return null;
  if(m.type==='stock') return vals[vals.length-1];
  if(m.type==='rate')  return vals.reduce((a,b)=>a+b,0)/vals.length;
  return vals.reduce((a,b)=>a+b,0);   // flow
}

/* ══ RENDER KPIs ═════════════════════════════════════════ */
function deltaHTML(m, cur, prev){
  if(cur==null) return `<div class="delta flat">—</div>`;
  if(prev==null||prev===0) return `<div class="delta flat">—<span class="prev">sem base anterior</span></div>`;
  const d=cur-prev;
  let txt, cls=d>0?'up':d<0?'down':'flat';
  const arrow=d>0?'▲':d<0?'▼':'■';
  if(m.type==='rate'){
    txt=(d>=0?'+':'')+(d*100).toFixed(2).replace('.',',')+' pp';
  }else{
    const pct=(d/Math.abs(prev))*100;
    txt=(d>=0?'+':'')+pct.toFixed(1).replace('.',',')+'%';
  }
  return `<div class="delta ${cls}">${arrow} ${txt}<span class="prev">vs anterior</span></div>`;
}

function renderKPIs(net){
  const {cur,prev}=slicePeriod(store[net].rows);
  el(net+'-kpis').innerHTML = METRICS[net].map(m=>{
    const cv=aggregate(cur,m), pv=aggregate(prev,m);
    return `<div class="kpi"><div class="label">${m.label}</div>
      <div class="value">${fmtMetric(m,cv)}</div>
      ${deltaHTML(m,cv,pv)}</div>`;
  }).join('');
}

/* ══ RENDER GRÁFICOS ═════════════════════════════════════ */
const charts={};
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; }
// fade vertical (fill) + gradiente horizontal na linha (stroke)
function fadeFill(hex){ return (ctx)=>{ const {chart}=ctx,{ctx:cc,chartArea}=chart; if(!chartArea)return hexA(hex,.1);
  const g=cc.createLinearGradient(0,chartArea.top,0,chartArea.bottom); g.addColorStop(0,hexA(hex,.26)); g.addColorStop(1,hexA(hex,0)); return g; }; }
function lineStroke(hex){ return (ctx)=>{ const {chart}=ctx,{ctx:cc,chartArea}=chart; if(!chartArea)return hex;
  const g=cc.createLinearGradient(chartArea.left,0,chartArea.right,0); g.addColorStop(0,hexA(hex,.55)); g.addColorStop(1,hex); return g; }; }
// Gradiente vertical nas colunas (topo=accent2 claro → base=accent escuro) — um único hue (laranja)
function barGrad(){ return (ctx)=>{ const {chart}=ctx,{ctx:cc,chartArea}=chart; if(!chartArea)return C.accent;
  const g=cc.createLinearGradient(0,chartArea.top,0,chartArea.bottom); g.addColorStop(0,C.accent2); g.addColorStop(1,C.accent); return g; }; }

const axOpts=(pct)=>({
  responsive:true, maintainAspectRatio:false, animation:false,
  interaction:{mode:'index',intersect:false},
  plugins:{ legend:{ display:false },
    tooltip:{ backgroundColor:'#1a1a1d', borderColor:C.grid, borderWidth:1, padding:10, titleColor:'#f5f5f6', bodyColor:'#c7c7cb',
      callbacks: pct?{label:c=>` ${c.dataset.label}: ${c.parsed.y!=null?c.parsed.y.toFixed(2).replace('.',',')+'%':'—'}`}
                    :{label:c=>` ${c.dataset.label}: ${c.parsed.y!=null?Number(c.parsed.y).toLocaleString('pt-BR'):'—'}`} } },
  scales:{
    x:{ ticks:{ color:C.txt, maxRotation:0, autoSkip:true, maxTicksLimit:7, font:{size:10} }, grid:{ display:false }, border:{color:C.grid} },
    y:{ ticks:{ color:C.txt, font:{size:10}, maxTicksLimit:6, callback:v=> pct? v+'%' : Number(v).toLocaleString('pt-BR') },
        grid:{ color:hexA(C.grid,.7) }, border:{display:false}, beginAtZero:false }
  }
});
const doughOpts=()=>({
  responsive:true, maintainAspectRatio:false, animation:false, cutout:'66%',
  plugins:{ legend:{ position:'right', labels:{ color:C.txt, boxWidth:8, boxHeight:8, usePointStyle:true, pointStyle:'circle', padding:12, font:{size:11} } },
    tooltip:{ backgroundColor:'#1a1a1d', borderColor:C.grid, borderWidth:1, padding:10, titleColor:'#f5f5f6', bodyColor:'#c7c7cb',
      callbacks:{ label:c=>` ${c.label}: ${Number(c.parsed).toLocaleString('pt-BR')}` } } }
});
// Variante do axOpts com legenda visível (usada quando a "Composição de engajamento" vira linhas — 3-4 séries no mesmo eixo precisam de legenda, nunca só cor).
const axOptsMulti=()=>{ const o=axOpts(false);
  // 'top' em vez de 'right': painel estreito (1/3 do grid) + eixo Y competindo por espaço
  // cortava o fim de rótulos longos ("Views de Perfil") numa coluna de legenda lateral.
  o.plugins.legend={ display:true, position:'top', align:'start', labels:{ color:C.txt, boxWidth:8, boxHeight:8, usePointStyle:true, pointStyle:'circle', padding:10, font:{size:11} } };
  return o; };

/* Ícone do toggle rosca/linha + estado (por painel, sobrevive a troca de período/rede). */
const chartView={};   // key: net+idx → 'doughnut' | 'line'
const ICO_DOUGH='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7.2" stroke-width="4.2"/></svg>';
const ICO_LINE ='<svg viewBox="0 0 24 24"><path d="M3 16l5.5-7 4 4.5L21 5"/></svg>';
function toggleHTML(net,idx){
  const mode=chartView[net+idx]||'doughnut';
  return `<span class="chart-toggle">
    <button class="ctbtn ${mode==='doughnut'?'active':''}" onclick="setChartView('${net}',${idx},'doughnut')" title="Rosca">${ICO_DOUGH}</button>
    <button class="ctbtn ${mode==='line'?'active':''}" onclick="setChartView('${net}',${idx},'line')" title="Linha">${ICO_LINE}</button>
  </span>`;
}
// Troca só o toggle rosca/linha de UM painel — nada de recriar os outros gráficos
// da rede (era isso que causava o "flick" no gráfico vizinho ao clicar no toggle).
function setChartView(net,idx,mode){
  chartView[net+idx]=mode;
  const panelEl=el(net+'-charts').children[idx];
  if(panelEl) panelEl.querySelectorAll('.ctbtn').forEach((b,i)=> b.classList.toggle('active', (i===0?'doughnut':'line')===mode));
  const {cur}=slicePeriod(store[net].rows);
  const labels=cur.map(r=> r.date.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}));
  renderPanelChart(net, idx, CHARTS[net][idx], cur, labels, true);
}

// Cria/atualiza o Chart.js de UM painel específico (canvas já precisa existir no DOM).
// animateSwap=true só quando é o usuário trocando rosca↔linha (transição suave e rápida,
// mas targeted); nas rendas completas (troca de aba/período) fica animation:false, senão
// toda filtragem de período reanimaria todos os gráficos e pareceria lento.
function renderPanelChart(net, idx, cfg, cur, labels, animateSwap){
  if(charts[net+idx]){ charts[net+idx].destroy(); }

  if(cfg.kind==='doughnut' && (chartView[net+idx]||'doughnut')==='doughnut'){
    const vals=cfg.series.map(s=> cur.reduce((a,r)=> a+(r.vals[s.col]||0), 0));
    const cols=cfg.series.map(s=> C[s.color]||s.color);
    const opts=doughOpts(); if(animateSwap) opts.animation={duration:260,easing:'easeOutQuart'};
    charts[net+idx]=new Chart(el(`${net}-c${idx}`),{ type:'doughnut',
      data:{ labels:cfg.series.map(s=>s.label), datasets:[{ data:vals, backgroundColor:cols.map(h=>hexA(h,.9)),
        borderColor:'#151517', borderWidth:2, hoverBorderColor:'#151517', hoverOffset:6 }] },
      options:opts });
    return;
  }

  if(cfg.kind==='doughnut' && chartView[net+idx]==='line'){
    // mesma composição, como séries no tempo — sem preenchimento (área empilhada de escalas
    // diferentes vira poluição visual); 3-4 séries → legenda sempre visível (nunca só por cor).
    const datasets=cfg.series.map(s=>{
      const hex=C[s.color]||s.color;
      const data=cur.map(r=> r.vals[s.col]);
      return { label:s.label, data, borderColor:hex, backgroundColor:hex, fill:false,
        borderWidth:1.8, tension:.38, pointRadius:0, pointHoverRadius:4, pointHoverBackgroundColor:hex, pointHoverBorderColor:'#fff', pointHoverBorderWidth:1 };
    });
    const opts=axOptsMulti(); if(animateSwap) opts.animation={duration:260,easing:'easeOutQuart'};
    charts[net+idx]=new Chart(el(`${net}-c${idx}`), { type:'line', data:{labels,datasets}, options:opts });
    return;
  }

  const datasets=cfg.series.map(s=>{
    const hex=C[s.color]||s.color;
    const data=cur.map(r=>{ let v=r.vals[s.col]; return cfg.pct&&v!=null? +(v*100).toFixed(2) : v; });
    if(cfg.kind==='gradbar'){
      return { label:s.label||cfg.title, data, backgroundColor:barGrad(), hoverBackgroundColor:barGrad(),
        borderRadius:4, borderSkipped:false, maxBarThickness:26, categoryPercentage:.72, barPercentage:.92 };
    }
    return { label:s.label||cfg.title, data, borderColor:lineStroke(hex), backgroundColor:fadeFill(hex),
      borderWidth:1.6, fill:true, tension:.38, pointRadius:0, pointHoverRadius:4, pointHoverBackgroundColor:hex, pointHoverBorderColor:'#fff', pointHoverBorderWidth:1 };
  });

  const type = cfg.kind==='gradbar' ? 'bar' : 'line';
  charts[net+idx]=new Chart(el(`${net}-c${idx}`), { type, data:{labels,datasets}, options:axOpts(!!cfg.pct) });
}

function renderCharts(net){
  const {cur}=slicePeriod(store[net].rows);
  const labels=cur.map(r=> r.date.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}));
  const host=el(net+'-charts'); host.innerHTML='';

  CHARTS[net].forEach((cfg,idx)=>{
    const panel=document.createElement('div');
    panel.className='panel '+(cfg.cls||'')+(cfg.tall?' tall':'');
    const rightHTML=`<span class="h3-right">${cfg.kind==='doughnut'?toggleHTML(net,idx):''}<span class="tag">${cfg.tag||''}</span></span>`;
    panel.innerHTML=`<h3><span>${cfg.title}</span>${rightHTML}</h3><div class="cwrap"><canvas id="${net}-c${idx}"></canvas></div>`;
    host.appendChild(panel);
    renderPanelChart(net, idx, cfg, cur, labels, false);
  });
}

/* ══ PERÍODO UI ══════════════════════════════════════════ */
function renderPeriodBar(){
  el('periodSeg').innerHTML = '<div class="segmented">'+PERIODS.map(p=>
    `<button class="seg ${p.id===currentPeriod?'active':''}" onclick="setPeriod('${p.id}')">${p.label}</button>`).join('')+'</div>';
}
function fmtRange(r){ return r? r[0].toLocaleDateString('pt-BR')+' – '+r[1].toLocaleDateString('pt-BR') : ''; }

function refreshAll(){
  NETS.forEach(net=>{ if(store[net]){ renderKPIs(net); renderCharts(net); } });
  const any=NETS.map(n=>store[n]).find(s=>s&&s.rows.length);
  if(any){ const {curRange,prevRange}=slicePeriod(any.rows);
    el('periodNote').innerHTML = curRange? `Período: <b>${fmtRange(curRange)}</b>`+(prevRange?` · comparado a <b>${fmtRange(prevRange)}</b>`:'')
      : (currentPeriod==='custom' ? 'Escolha as datas de início e fim ao lado.' : ''); }
}

function setPeriod(id){
  currentPeriod=id; renderPeriodBar();
  const cr=el('customRange');
  if(id==='custom'){
    cr.style.display='inline-flex';
    // 1ª vez: sugere um intervalo razoável (últimos ~13 períodos, ~90 dias) dentro dos dados disponíveis.
    if(!el('cFrom').value || !el('cTo').value){
      const any=NETS.map(n=>store[n]).find(s=>s&&s.rows.length);
      if(any && any.rows.length){
        const last=any.rows[any.rows.length-1].date;
        const first=any.rows[Math.max(0, any.rows.length-13)].date;
        el('cFrom').value=fmtInputDate(first); el('cTo').value=fmtInputDate(last);
        customFrom=el('cFrom').value; customTo=el('cTo').value;
      }
    }
  } else cr.style.display='none';
  refreshAll();
}

function applyCustom(){
  customFrom=el('cFrom').value; customTo=el('cTo').value;
  refreshAll();
}

/* ══ ABAS (sidebar) ══════════════════════════════════════ */
function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  el(id).classList.add('active'); el('btn-'+id).classList.add('active');
  el('netTitle').textContent = NET_TITLE[id] || id;
  el('netSub').textContent = 'Acompanhe o desempenho de '+(NET_TITLE[id]||id)+' e métricas importantes.';
}

/* ══ LOAD ════════════════════════════════════════════════ */
async function loadAll(){
  const badge=el('syncBadge'),txt=el('syncText'),err=el('errBanner');
  badge.className='sync-card loading'; txt.textContent='Carregando…'; err.className='err-banner';
  renderPeriodBar();
  NETS.forEach(net=>{
    el(net+'-kpis').innerHTML = METRICS[net].map(()=>`<div class="kpi skeleton"><div class="label">—</div><div class="value">——</div><div class="delta">—</div></div>`).join('');
  });
  const nets=NETS;
  // Carrega cada aba listada em TABS (por gid) e mescla por rede.
  const results=await Promise.allSettled(TABS.map((t,i)=>gvizLoad(t.gid,'cb_'+t.net+'_'+t.gid+'_'+i)));

  nets.forEach(net=> store[net]={rows:[]});
  let anyOk=false, lastErr=null;
  results.forEach((res,i)=>{
    const {net}=TABS[i];
    if(res.status==='fulfilled'){ anyOk=true; store[net].rows=store[net].rows.concat(tableToRows(res.value)); }
    else lastErr=res.reason;
  });
  nets.forEach(net=> store[net].rows.sort((a,b)=>a.date-b.date));

  if(anyOk){
    // Limita o seletor "Personalizado" ao intervalo real de dados (anti-burro: não dá pra
    // escolher uma data que não existe em nenhuma aba).
    const allDates=nets.flatMap(net=>store[net].rows.map(r=>r.date));
    if(allDates.length){
      const min=fmtInputDate(new Date(Math.min(...allDates))), max=fmtInputDate(new Date(Math.max(...allDates)));
      el('cFrom').min=min; el('cFrom').max=max; el('cTo').min=min; el('cTo').max=max;
    }
    setPeriod(currentPeriod);
    badge.className='sync-card ok'; txt.textContent='Sincronizado';
    el('lastSync').textContent='Atualizado há instantes · '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }else{
    badge.className='sync-card error'; txt.textContent='Erro na sincronização';
    err.className='err-banner show';
    err.innerHTML=`<strong>Não foi possível carregar os dados.</strong><br>
      Causa: <code>${lastErr?lastErr.message:'nenhuma aba carregada'}</code><br><br>
      <strong>Verifique:</strong> (1) a planilha está compartilhada como <em>"Qualquer pessoa com o link — Leitor"</em>;
      (2) os <code>gid</code> em <code>TABS</code> conferem com as abas atuais da planilha.`;
    console.error('[Dashboard v2]',lastErr);
  }
}

loadAll();
</script>
